<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator - Baghdad Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .screen-hidden { display: none !important; }
        .screen-visible { display: block !important; }
        input {
            border: 2px solid #bae6fd !important;
            padding: 0.8rem !important;
            border-radius: 0.75rem !important;
            text-align: center;
            font-size: 1.1rem;
            width: 100%;
            background-color: white !important;
        }
        input:focus { border-color: #0ea5e9 !important; outline: none; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
        .action-btn {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 14px !important;
            font-weight: 700;
            width: 100%;
            transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.97); }
        .toast { animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800">

    <div id="toastContainer" class="fixed top-5 left-0 right-0 z-50 flex justify-center pointer-events-none">
        <div id="successToast" class="toast bg-emerald-600 text-white px-6 py-3 rounded-full shadow-2xl hidden pointer-events-auto font-bold">
            ✅ تم إبلاغ الصيدلية بنجاح
        </div>
    </div>

    <header class="bg-sky-600 text-white p-6 shadow-md text-center">
        <div class="flex items-center justify-between max-w-4xl mx-auto">
            <button id="backBtn" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg hidden text-sm">← رجوع</button>
            <div class="flex-1 text-center">
                <h1 class="text-xl md:text-2xl font-black">حاسبة جرعات NICU</h1>
                <p class="text-sky-100 text-xs mt-1">مستشفى بغداد التعليمي</p>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-4xl mx-auto w-full">
        <div id="screen1" class="screen-visible space-y-6 mt-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-lg font-bold text-sky-800 text-center mb-2">بيانات المريض</h2>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">اسم الطفل</label>
                    <input id="babyName" type="text" placeholder="مثال: طفل سارة">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">الوزن (كيلو)</label>
                    <input id="babyWeight" type="text" inputmode="decimal" placeholder="أدخل الوزن (0.5 - 5)">
                </div>
                
                <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm font-bold text-center border border-red-100"></div>
                
                <button id="toScreen2" class="w-full bg-sky-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-sky-100">
                    ابدأ اختيار الأدوية
                </button>
            </div>
        </div>

        <div id="screen2" class="screen-hidden">
            <h2 class="text-center font-bold text-slate-500 mb-4">اختر الأدوية المطلوبة:</h2>
            <div id="drugGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-44"></div>
        </div>

        <div id="screen3" class="screen-hidden space-y-4 pb-60">
            <div id="resultsContent" class="space-y-4"></div>
        </div>
    </main>

    <div id="footerCalc" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-4 hidden">
        <button id="calculateBtn" class="max-w-4xl mx-auto block w-full bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-xl disabled:opacity-50">
            حساب الجرعات
        </button>
    </div>

    <div id="footerResults" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 hidden shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <button id="manualSend" class="action-btn bg-blue-600 text-white">إعادة إبلاغ الصيدلية (Telegram)</button>
            <button onclick="location.reload()" class="action-btn bg-slate-100 text-slate-700 border border-slate-200">🔄 مريض جديد</button>
            <a href="https://t.me/NICU_BTHbot" target="_blank" class="action-btn bg-emerald-600 text-white text-sm">التواصل مع الصيادلة</a>
        </div>
    </div>

    <script>
        const DRUGS = [
            { id: 1, name: 'Amoxicillin', dose: 50, unit: 'mg', factor: 1, m: 1 },
            { id: 2, name: 'Gentamicin', dose: 5, unit: 'mg', factor: 12.5, m: 2 },
            { id: 3, name: 'Caffeine Loading', dose: 20, unit: 'mg', factor: 2, m: 3 },
            { id: 4, name: 'Caffeine Maintenance', dose: 10, unit: 'mg', factor: 50, m: 4 },
            { id: 5, name: 'Colistin Loading', dose: 150000, unit: 'IU', factor: 30, m: 5 },
            { id: 6, name: 'Colistin Maintenance', dose: 37500, unit: 'IU', factor: 7.5, m: 6 },
            { id: 7, name: 'Tigecycline', dose: 2, unit: 'mg', factor: 2, m: 7 },
            { id: 8, name: 'Meropenem', dose: 40, unit: 'mg', factor: 1.6, m: 8 },
            { id: 9, name: 'Dopamine', dose: 5, unit: 'mcg', factor: 36, m: 9, time: 1440 },
            { id: 10, name: 'Dexmedetomidine', dose: 0.3, unit: 'mcg', factor: 14.4, m: 10, time: 24 },
            { id: 11, name: 'Dex Loading', dose: 0.1, unit: 'mcg', factor: 5, m: 11 },
            { id: 12, name: 'Midazolam Loading', dose: 0.1, unit: 'mg', factor: 10, m: 12 },
            { id: 13, name: 'Midazolam Main.', dose: 0.03, unit: 'mg', factor: 14.4, m: 13, time: 24 },
            { id: 14, name: 'Phenobarbital Loading', dose: 20, unit: 'mg', factor: 4, m: 14 },
            { id: 15, name: 'Phenobarbital Main.', dose: 2.5, unit: 'mg', factor: 0.5, m: 15 }
        ];

        const TEXTS = {
            1: 'تسحب ** مل وتعطى خلال 5 دقائق',
            2: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            3: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            4: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            5: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            6: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            7: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            8: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            9: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            10: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            11: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة',
            12: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 5 دقائق',
            13: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            14: 'تخفف الامبولة الى 20 سيسي، يسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة',
            15: 'تخفف الامبولة الى 20 سيسي، يسحب ** وحدة انسولين وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة'
        };

        let selected = [], weight = 0, name = "";

        // دالة تنظيف ومعالجة الأرقام
        function cleanNum(s) {
            if(!s) return 0;
            let n = s.toString().replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]);
            n = n.replace(/،/g, '.').replace(/,/g, '.');
            return parseFloat(n) || 0;
        }

        // دالة العرض الذكي (إخفاء .0)
        function smart(n) {
            let val = Math.round(n * 10) / 10;
            return Number.isInteger(val) ? val.toString() : val.toFixed(1);
        }

        function toggleScreen(s) {
            document.getElementById('screen1').className = s==1?'screen-visible':'screen-hidden';
            document.getElementById('screen2').className = s==2?'screen-visible':'screen-hidden';
            document.getElementById('screen3').className = s==3?'screen-visible':'screen-hidden';
            document.getElementById('footerCalc').style.display = s==2?'block':'none';
            document.getElementById('footerResults').style.display = s==3?'block':'none';
            document.getElementById('backBtn').classList.toggle('hidden', s==1);
            window.scrollTo(0,0);
        }

        document.getElementById('toScreen2').onclick = () => {
            weight = cleanNum(document.getElementById('babyWeight').value);
            name = document.getElementById('babyName').value.trim() || "مجهول";
            const err = document.getElementById('errorMessage');

            if(weight < 0.5 || weight > 5) {
                err.innerText = "⚠️ خطأ: يجب أن يكون الوزن بالكيلوغرام بين 0.5 و 5 كجم فقط";
                err.classList.remove('hidden');
                return;
            }

            err.classList.add('hidden');
            renderGrid();
            toggleScreen(2);
        }

        function renderGrid() {
            const container = document.getElementById('drugGrid');
            container.innerHTML = DRUGS.map(d => {
                const isActive = selected.includes(d.id);
                return `<div onclick="selectDrug(${d.id})" class="p-4 rounded-2xl border-2 transition-all cursor-pointer flex justify-between items-center ${isActive?'bg-sky-600 border-sky-600 text-white shadow-md':'bg-white border-slate-100 text-slate-700'}">
                    <div>
                        <div class="font-bold">${d.name}</div>
                        <div class="text-xs opacity-60">${d.dose} ${d.unit}/kg</div>
                    </div>
                    ${isActive ? '✅' : ''}
                </div>`;
            }).join('');
            document.getElementById('calculateBtn').disabled = selected.length === 0;
        }

        window.selectDrug = (id) => {
            selected = selected.includes(id) ? selected.filter(i => i!==id) : [...selected, id];
            renderGrid();
        }

        document.getElementById('calculateBtn').onclick = () => {
            const resultsArea = document.getElementById('resultsContent');
            let summaryForBot = [];
            const isTiny = weight < 1;

            resultsArea.innerHTML = selected.map(id => {
                const d = DRUGS.find(x => x.id === id);
                let rawDose = weight * d.dose * (d.time || 1);
                if(id === 9) rawDose /= 1000;

                let f = d.factor, txt = TEXTS[d.m];

                // قواعد الأطفال أقل من 1 كجم
                if(isTiny) {
                    if([3, 7, 8].includes(id)) { 
                        f = (id === 8) ? 2.4 : 3;
                        txt = txt.replace('10 سيسي ويعطى 10', '10 سيسي ويعطى 5').replace('##', '^^');
                    }
                    if(id === 1) { f = 100; txt = 'تسحب ** وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق'; }
                    if(id === 14) { f = 6; txt = txt.replace('10 سيسي وتعطى 10', '10 سيسي وتعطى 5').replace('##', '^^'); }
                }

                // قاعدة الفينوباربيتال الاستمراري
                if(id === 15) {
                    if(weight >= 2) f = 0.5;
                    else if(weight >= 1) f = 50;
                    else { f = 75; txt = txt.replace('20 سيسي', '15 سيسي').replace('تعطى 10', 'تعطى 5'); }
                }

                let vol = smart(weight * f);
                let finalTxt = txt.replace('**', vol)
                                  .replace('##', smart(20 - cleanNum(vol)))
                                  .replace('^^', smart(15 - cleanNum(vol)));

                summaryForBot.push({ name: d.name, dose: smart(rawDose), unit: id===9?'mg':d.unit });

                return `<div class="bg-white p-5 rounded-3xl border-r-8 border-sky-500 shadow-sm space-y-2">
                    <div class="text-sky-600 text-xs font-bold uppercase">${d.name}</div>
                    <div class="text-3xl font-black">${smart(rawDose)} <span class="text-sm font-normal text-slate-400">${id===9?'mg':d.unit}</span></div>
                    <p class="text-slate-600 text-sm leading-relaxed">${finalTxt}</p>
                </div>`;
            }).join('');

            toggleScreen(3);
            sendToTelegram(summaryForBot, true);
        }

        async function sendToTelegram(data, isAuto) {
            const token = '8554444620:AAEKG5brSd0RFQ-NftjIHp7OJtqJRhQuJog';
            const chat = '-1002141194993';
            let msg = isAuto ? `🔔 *عملية حسابية جديدة*\n` : `🚀 *تأكيد إعطاء العلاج*\n`;
            msg += `👶 المريض: ${name} (${smart(weight)}kg)\n\n`;
            data.forEach((r, i) => msg += `${i+1}. *${r.name}*: ${r.dose} ${r.unit}\n`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: chat, text: msg, parse_mode: 'Markdown' })
                });
                if(!isAuto && res.ok) {
                    const t = document.getElementById('successToast');
                    t.classList.remove('hidden');
                    setTimeout(() => t.classList.add('hidden'), 3000);
                }
            } catch (e) { console.error("Error"); }
        }

        document.getElementById('manualSend').onclick = () => {
            const data = selected.map(id => {
                const d = DRUGS.find(x => x.id === id);
                let rawDose = weight * d.dose * (d.time || 1);
                if(id === 9) rawDose /= 1000;
                return { name: d.name, dose: smart(rawDose), unit: id===9?'mg':d.unit };
            });
            sendToTelegram(data, false);
        }

        document.getElementById('backBtn').onclick = () => {
            if(document.getElementById('screen3').className.includes('screen-visible')) toggleScreen(2);
            else toggleScreen(1);
        }
    </script>
</body>
</html>
