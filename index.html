<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator | حاسبة الجرعات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .screen-hidden {
            display: none !important;
        }

        .screen-visible {
            display: block !important;
        }

        input {
            border: 2px solid #93c5fd !important;
            padding: 0.75rem 1rem !important;
            border-radius: 0.5rem !important;
            background-color: white !important;
            text-align: center;
            width: 100%;
        }

        .action-btn {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            border-radius: 12px !important;
            width: 100%;
            font-weight: bold;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* تنسيق مخصص لمربع طريقة التحضير */
        .prep-box {
            background-color: #fff7ed;
            border-right: 4px solid #f97316;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #7c2d12;
            font-weight: 600;
        }

        .dopamine-table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
            font-size: 0.9rem;
            direction: ltr; 
            text-align: left; 
        }
        
        .dopamine-table th, .dopamine-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
        }
        
        .dopamine-table th {
            background-color: #f1f5f9;
            color: #1e293b;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-cyan-50 to-teal-50 min-h-screen flex flex-col">

    <header class="bg-gradient-to-l from-sky-500 to-teal-500 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6 text-center">
            <div class="flex items-center justify-between">
                <button id="backBtn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg hidden">
                    ← رجوع
                </button>
                <div class="flex-1 text-center">
                    <h1 class="text-2xl md:text-3xl font-bold">حاسبة الجرعات</h1>
                    <p class="text-sky-100 text-sm">مستشفى بغداد التعليمي - NICU</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 px-4 py-8">
        <div id="greetingScreen" class="screen-visible">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border-2 border-sky-100 p-6 space-y-6">
                <h2 class="text-xl font-bold text-sky-800 text-center">معلومات المريض</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sky-700 font-semibold mb-1">اسم الطفل</label>
                        <input id="babyName" type="text" placeholder="أدخل اسم الطفل">
                    </div>
                    <div>
                        <label class="block text-sky-700 font-semibold mb-1">الوزن (كجم)</label>
                        <input id="babyWeight" type="text" placeholder="مثال: 2.5">
                    </div>
                    <div id="errorMessage" class="text-red-600 text-sm font-bold text-center hidden"></div>
                    <button id="selectTreatmentBtn" class="w-full bg-sky-600 text-white py-4 rounded-xl font-bold shadow-lg">
                        اختيار العلاج
                    </button>
                </div>
            </div>
        </div>

        <div id="drugSelectionScreen" class="screen-hidden">
            <div class="max-w-4xl mx-auto">
                <div id="drugGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-32"></div>
            </div>
        </div>

        <div id="resultsScreen" class="screen-hidden">
            <div class="max-w-4xl mx-auto pb-48">
                <div id="resultsGrid" class="grid grid-cols-1 gap-6"></div>
            </div>
        </div>
    </main>

    <div id="calculateBtnContainer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 hidden">
        <button id="calculateBtn" class="w-full max-w-4xl mx-auto block bg-gradient-to-l from-sky-500 to-teal-500 text-white py-4 rounded-xl font-bold shadow-lg disabled:opacity-50">
            حساب الجرعات وإبلاغ البوت
        </button>
    </div>

    <div id="resultsFooter" class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 hidden shadow-[0_-5px_20px_rgba(0,0,0,0.1)]">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <button id="startOverBtn" class="action-btn bg-white border-2 border-emerald-500 text-emerald-700">
                🔄 بدء جديد
            </button>
        </div>
    </div>

    <script>
        // طرق التحضير
        const PREPS = {
            1: 'تحل الفيالة بـ 10 سيسي نورمال سلاين',
            2: 'لم يتم تحديد طريقة تحضير لهذا العلاج بعد',
            9: '1 مل (40 ملغم) دوبامين + 39 مل جلوكوز ووتر (المجموع 40 مل)'
        };

        const DRUGS = [
            { id: 1, name: 'Amoxicillin', dosePerKg: 50, unit: 'mg', factor: 1, methodIndex: 1, prepIndex: 1, timeMultiplier: 1 },
            { id: 2, name: 'Gentamicin', dosePerKg: 5, unit: 'mg', factor: 12.5, methodIndex: 2, prepIndex: 2, timeMultiplier: 1 },
            { id: 3, name: 'Caffeine Loading', dosePerKg: 20, unit: 'mg', factor: 2, methodIndex: 3, prepIndex: 2, timeMultiplier: 1 },
            { id: 4, name: 'Caffeine Maintenance', dosePerKg: 10, unit: 'mg', factor: 50, methodIndex: 4, prepIndex: 2, timeMultiplier: 1 },
            { id: 5, name: 'Colistin Loading', dosePerKg: 150000, unit: 'IU', factor: 30, methodIndex: 5, prepIndex: 2, timeMultiplier: 1 },
            { id: 6, name: 'Colistin Maintenance', dosePerKg: 37500, unit: 'IU', factor: 7.5, methodIndex: 6, prepIndex: 2, timeMultiplier: 1 },
            { id: 7, name: 'Tigecycline', dosePerKg: 2, unit: 'mg', factor: 2, methodIndex: 7, prepIndex: 2, timeMultiplier: 1 },
            { id: 8, name: 'Meropenem', dosePerKg: 40, unit: 'mg', factor: 1.6, methodIndex: 8, prepIndex: 2, timeMultiplier: 1 },
            { id: 9, name: 'Dopamine', dosePerKg: 5, unit: 'mcg', factor: 36, methodIndex: 9, prepIndex: 9, timeMultiplier: 1440 },
            { id: 10, name: 'Dexmedetomidine', dosePerKg: 0.3, unit: 'mcg', factor: 14.4, methodIndex: 10, prepIndex: 2, timeMultiplier: 24 },
            { id: 11, name: 'Dexmedetomidine Loading', dosePerKg: 0.1, unit: 'mcg', factor: 5, methodIndex: 11, prepIndex: 2, timeMultiplier: 1 },
            { id: 12, name: 'Midazolam Loading', dosePerKg: 0.1, unit: 'mg', factor: 10, methodIndex: 12, prepIndex: 2, timeMultiplier: 1 },
            { id: 13, name: 'Midazolam Maintenance', dosePerKg: 0.03, unit: 'mg', factor: 14.4, methodIndex: 13, prepIndex: 2, timeMultiplier: 24 },
            { id: 14, name: 'Phenobarbital Loading', dosePerKg: 20, unit: 'mg', factor: 4, methodIndex: 14, prepIndex: 2, timeMultiplier: 1 },
            { id: 15, name: 'Phenobarbital Maintenance', dosePerKg: 2.5, unit: 'mg', factor: 0.5, methodIndex: 15, prepIndex: 2, timeMultiplier: 1 },
            { id: 16, name: 'Hydrocortisone', dosePerKg: 2, unit: 'mg', factor: 10, methodIndex: 16, prepIndex: 2, timeMultiplier: 1 }
        ];

        const METHODS = {
            1: 'تسحب ** مل وتعطى خلال 5 دقائق',
            2: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            3: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            4: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            5: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            6: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            7: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            8: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            9: 'عن طريق جهاز الإعطاء المستمر بالسرعات الموضحة في الجدول أدناه.',
            10: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            11: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة',
            12: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 5 دقائق',
            13: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            14: 'تخفف الامبولة الى 20 سيسي، يسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة',
            15: 'تخفف الامبولة الى 20 سيسي، يسحب ** وحدة انسولين وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة',
            16: 'تسحب ** وحدة انسولين وتخفف الى 3 سيسي مع نورمال سلاين وتعطى خلال 5 دقائق'
        };

        let selectedDrugs = [];
        let patientInfo = null;

        function normalizeNum(s) {
            if(!s) return "";
            let res = s.replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]); 
            res = res.replace(/،/g, '.'); 
            return res;
        }

        function smartFormat(num) {
            let val = Math.round(num * 10) / 10;
            return Number.isInteger(val) ? val.toString() : val.toFixed(1);
        }

        function showScreen(screen) {
            document.getElementById('greetingScreen').className = screen === 'greeting' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('drugSelectionScreen').className = screen === 'drugSelection' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('resultsScreen').className = screen === 'results' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('calculateBtnContainer').classList.toggle('hidden', screen !== 'drugSelection');
            document.getElementById('resultsFooter').classList.toggle('hidden', screen !== 'results');
            document.getElementById('backBtn').classList.toggle('hidden', screen === 'greeting');
            window.scrollTo(0,0);
        }

        window.toggleDrug = function(id) {
            if (selectedDrugs.includes(id)) {
                selectedDrugs = selectedDrugs.filter(x => x !== id);
            } else {
                selectedDrugs = [...selectedDrugs, id];
            }
            renderDrugGrid();
        };

        function renderDrugGrid() {
            const grid = document.getElementById('drugGrid');
            grid.innerHTML = DRUGS.map(d => {
                const isSel = selectedDrugs.includes(d.id);
                return `
                    <div onclick="toggleDrug(${d.id})" class="p-5 rounded-xl border-2 cursor-pointer transition-all ${isSel ? 'bg-sky-600 border-sky-700 text-white' : 'bg-white border-sky-100 text-sky-800'}">
                        <div class="font-bold text-lg text-left" dir="ltr">${d.name}</div>
                        <div class="text-xs opacity-70 text-left" dir="ltr">${d.dosePerKg} ${d.unit}/kg</div>
                    </div>
                `;
            }).join('');
            document.getElementById('calculateBtn').disabled = selectedDrugs.length === 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('selectTreatmentBtn').onclick = () => {
                const weightStr = normalizeNum(document.getElementById('babyWeight').value);
                const weight = parseFloat(weightStr);
                const err = document.getElementById('errorMessage');
                if (isNaN(weight) || weight <= 0 || weight < 0.5 || weight > 5) {
                    err.innerText = "الرجاء إدخال وزن صحيح (0.5 - 5 كجم)";
                    err.classList.remove('hidden');
                    return;
                }
                err.classList.add('hidden');
                patientInfo = { name: document.getElementById('babyName').value.trim() || 'مجهول', weight: weight };
                renderDrugGrid();
                showScreen('drugSelection');
            };

            document.getElementById('calculateBtn').onclick = () => {
                const grid = document.getElementById('resultsGrid');
                const isTiny = patientInfo.weight < 1;

                grid.innerHTML = selectedDrugs.map((id, idx) => {
                    const drug = DRUGS.find(d => d.id === id);
                    
                    // حالة الدوبامين الخاصة
                    if (id === 9) {
                        const doses = [2, 5, 7, 10];
                        let tableRows = doses.map(ds => {
                            let ml24 = Math.round(ds * patientInfo.weight * 1.44);
                            return `<tr><td>${ds} mcg/kg/min</td><td>${ml24} ml / 24h</td></tr>`;
                        }).join('');
                        return `
                            <div class="bg-white p-5 rounded-2xl shadow-md border-r-8 border-sky-500">
                                <h3 class="font-bold text-sky-900 text-left text-2xl mb-1" dir="ltr">${idx+1}. ${drug.name}</h3>
                                <div class="prep-box text-right" dir="rtl">طريقة التحضير: ${PREPS[9]}</div>
                                <p class="text-gray-700 leading-relaxed text-right mb-2" dir="rtl">طريقة الإعطاء: ${METHODS[9]}</p>
                                <table class="dopamine-table" dir="ltr">
                                    <thead><tr><th>Dose</th><th>Rate (ml / 24h)</th></tr></thead>
                                    <tbody>${tableRows}</tbody>
                                </table>
                            </div>
                        `;
                    }

                    // بقية الأدوية
                    let dose = patientInfo.weight * drug.dosePerKg * drug.timeMultiplier;
                    let factor = drug.factor;
                    let meth = METHODS[drug.methodIndex];

                    // التعديلات للأوزان الصغيرة
                    if (isTiny) {
                        if ([3, 7, 8].includes(id)) {
                            factor = (id === 8) ? 2.4 : 3;
                            meth = meth.replace('10 سيسي ويعطى 10', '10 سيسي ويعطى 5').replace('##', '^^');
                        }
                        if (id === 1) {
                            factor = 100;
                            meth = 'تسحب ** وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق';
                        }
                    }

                    let volVal = patientInfo.weight * factor;
                    let volFinal = meth.includes('وحدة انسولين') ? Math.round(volVal) : smartFormat(volVal);

                    let finalMeth = meth.replace('**', volFinal)
                                        .replace('##', smartFormat(20 - parseFloat(volFinal)))
                                        .replace('^^', smartFormat(15 - parseFloat(volFinal)));

                    return `
                        <div class="bg-white p-5 rounded-2xl shadow-md border-r-8 border-sky-500">
                            <h3 class="font-bold text-sky-900 text-left text-2xl mb-1" dir="ltr">${idx+1}. ${drug.name}</h3>
                            <div class="text-2xl font-black text-sky-600 mb-3 text-left" dir="ltr">
                                ${smartFormat(dose)} <span class="text-sm font-normal text-gray-500">${drug.unit}</span>
                            </div>
                            <div class="prep-box text-right" dir="rtl">
                                طريقة التحضير: ${PREPS[drug.prepIndex]}
                            </div>
                            <p class="text-gray-700 leading-relaxed text-right font-bold" dir="rtl">
                                طريقة الإعطاء: <span class="text-sky-700">${finalMeth}</span>
                            </p>
                        </div>
                    `;
                }).join('');
                showScreen('results');
            };

            document.getElementById('backBtn').onclick = () => {
                const resultsVisible = !document.getElementById('resultsScreen').className.includes('screen-hidden');
                if (resultsVisible) showScreen('drugSelection');
                else showScreen('greeting');
            };
            document.getElementById('startOverBtn').onclick = () => { location.reload(); };
        });
    </script>
</body>
</html>
