<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator | Baghdad Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .screen-hidden { display: none !important; }
        .screen-visible { display: block !important; }
        
        input {
            border: 2px solid #e2e8f0 !important;
            padding: 0.85rem !important;
            border-radius: 1rem !important;
            text-align: center;
            width: 100%;
            font-size: 1.1rem;
        }

        .prep-box {
            background-color: #fff7ed;
            border-right: 4px solid #f97316;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #7c2d12;
            font-weight: 600;
        }

        .dopamine-table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
            font-size: 0.85rem;
            direction: ltr;
        }
        .dopamine-table th, .dopamine-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: center;
        }
        .dopamine-table th { background: #f8fafc; color: #475569; }

        .toast { animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="toastContainer" class="fixed top-4 left-0 right-0 z-50 flex justify-center pointer-events-none">
        <div id="successToast" class="toast bg-emerald-600 text-white px-6 py-3 rounded-full shadow-lg hidden pointer-events-auto">
            ✅ تم إبلاغ الصيدلية بنجاح!
        </div>
    </div>

    <header class="bg-sky-600 text-white p-5 shadow-lg sticky top-0 z-40">
        <div class="flex items-center justify-between max-w-4xl mx-auto">
            <button id="backBtn" class="bg-white/20 p-2 rounded-xl hidden"> 🔙 </button>
            <div class="flex-1 text-center">
                <h1 class="text-xl font-bold">حاسبة جرعات الخدج</h1>
                <p class="text-[10px] text-sky-100 uppercase tracking-widest">Baghdad Teaching Hospital</p>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4">
        <div id="greetingScreen" class="screen-visible max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl mt-6 border border-sky-100">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">معلومات المريض</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">اسم الطفل</label>
                    <input id="babyName" type="text" placeholder="أدخل اسم الطفل">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">الوزن (كجم)</label>
                    <input id="babyWeight" type="text" placeholder="مثال: ١.٥ أو 1.5">
                </div>
                <div id="errorMessage" class="text-red-500 text-sm font-bold text-center hidden bg-red-50 p-2 rounded-lg"></div>
                <button id="selectTreatmentBtn" class="w-full bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    اختيار العلاج
                </button>
            </div>
        </div>

        <div id="drugSelectionScreen" class="screen-hidden max-w-4xl mx-auto">
            <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">اختر الأدوية (A-Z)</h2>
            <div id="drugGrid" dir="ltr" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-40"></div>
        </div>

        <div id="resultsScreen" class="screen-hidden max-w-2xl mx-auto">
            <div id="resultsGrid" class="space-y-4 pb-80"></div>
        </div>
    </main>

    <div id="calculateBtnContainer" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 hidden z-50">
        <button id="calculateBtn" class="w-full max-w-4xl mx-auto block bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-lg disabled:opacity-50">
            حساب النتائج وإرسال للبوت
        </button>
    </div>

    <div id="resultsFooter" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t p-4 hidden z-50">
        <div class="max-w-md mx-auto space-y-3">
            <button id="sendToTelegramBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                🚀 تبليغ الصيادلة بالإعطاء
            </button>
            <button id="startOverBtn" class="w-full bg-slate-100 text-slate-700 py-3 rounded-xl font-semibold border active:scale-95"> 
                🔄 مريض جديد 
            </button>
        </div>
    </div>

    <script>
        const DRUGS = [
            {
                id: 1, name: 'Amoxicillin', dosePerKg: 50, unit: 'mg', timeMultiplier: 1,
                concentration: 50, lossType: null,
                prep: 'تحل الفيالة بـ 10 سيسي نورمال سلاين',
                getAdmin(volMl, add, w) {
                    if (w < 1) return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق`;
                    return `تسحب ${smartFormat(volMl)} مل وتعطى خلال 5 دقائق`;
                }
            },
            {
                id: 17, name: 'Amikacin', dosePerKg: 15, unit: 'mg', timeMultiplier: 1,
                concentration: 8, lossType: null,
                prep: 'تخفف الامبولة مع 60 سيسي نورمال سلاين',
                getAdmin(volMl) {
                    return `تسحب ${smartFormat(volMl)} سيسي وتخفف بـ 3 سيسي كلوكوز وتر ويعطى خلال 10 دقائق`;
                }
            },
            {
                id: 2, name: 'Gentamicin', dosePerKg: 5, unit: 'mg', timeMultiplier: 1,
                concentration: 40, lossType: null,
                prep: 'تسحب الجرعة مباشرة من الامبولة',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق`;
                }
            },
            {
                id: 3, name: 'Caffeine Loading', dosePerKg: 20, unit: 'mg', timeMultiplier: 1,
                concentration: 20, 
                lossType: (w) => w < 1 ? { bag: 15, give: 5 } : { bag: 20, give: 10 },
                prep: 'تسحب الجرعة مباشرة من الامبولة',
                getAdmin(volMl, add, w) {
                    let giveTxt = w < 1 ? '5' : '10';
                    return `تسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى ${giveTxt} خلال 30 دقيقة`;
                }
            },
            {
                id: 4, name: 'Caffeine Maint.', dosePerKg: 10, unit: 'mg', timeMultiplier: 1,
                concentration: 20, lossType: null,
                prep: 'تسحب الجرعة مباشرة من الامبولة',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق`;
                }
            },
            {
                id: 5, name: 'Colistin Loading', dosePerKg: 150000, unit: 'IU', timeMultiplier: 1,
                concentration: 500000, lossType: null,
                prep: 'تحل الفيالة بقوة 150mg او 4.5MIU ب9 سيسي ماء مقطر حصراً، وبقوة 1MIU ب2 سيسي ماء مقطر حصراً',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق`;
                }
            },
            {
                id: 6, name: 'Colistin Maint.', dosePerKg: 37500, unit: 'IU', timeMultiplier: 1,
                concentration: 500000, lossType: null,
                prep: 'تحل الفيالة بقوة 150mg او 4.5MIU ب9 سيسي ماء مقطر حصراً، وبقوة 1MIU ب2 سيسي ماء مقطر حصراً',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق`;
                }
            },
            {
                id: 7, name: 'Tigecycline', dosePerKg: 2, unit: 'mg', timeMultiplier: 1,
                concentration: 2, 
                lossType: (w) => w < 1 ? { bag: 15, give: 5 } : { bag: 20, give: 10 },
                prep: 'تحل الفيالة بقوة 50mg ب 5.3 سيسي كلوكوز وتر ، ويسحب 5 سيسي فقط من الفيالة وتضاف الى 20 سيسي كلوكوز وتر',
                getAdmin(volMl, add, w) {
                    let giveTxt = w < 1 ? '5' : '10';
                    return `تسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى ${giveTxt} خلال 30 دقيقة`;
                }
            },
            {
                id: 8, name: 'Meropenem', dosePerKg: 40, unit: 'mg', timeMultiplier: 1,
                concentration: 50, 
                lossType: (w) => w < 1 ? { bag: 15, give: 5 } : { bag: 20, give: 10 },
                prep: 'تحل الفيالة بقوة 1gm ب20 سيسي نورمال سلاين، وبقوة 500mg ب10 سيسي نورمال سلاين',
                getAdmin(volMl, add, w) {
                    if (w < 1) return `تسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 5 خلال 30 دقيقة`;
                    return `تسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة`;
                }
            },
            {
                id: 9, name: 'Dopamine', dosePerKg: 5, unit: 'mcg', timeMultiplier: 1440,
                isInfusion: true, lossType: null,
                prep: '1 مل (40 ملغم) دوبامين + 39 مل جلوكوز ووتر (المجموع 40 مل)',
                getAdmin() {
                    return 'عن طريق جهاز الإعطاء المستمر بالسرعات الموضحة أدناه.';
                }
            },
            {
                id: 10, name: 'Dexmedetomidine', dosePerKg: 0.3, unit: 'mcg', timeMultiplier: 24,
                concentration: 100, lossType: { bag: 20, give: 10 },
                prep: 'تسحب الجرعة مباشرة من الامبولة',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 خلال 24 ساعة`;
                }
            },
            {
                id: 11, name: 'Dexmedetomidine Load', dosePerKg: 0.1, unit: 'mcg', timeMultiplier: 1,
                concentration: 2, lossType: null,
                prep: 'تخفف 10 يونت من الامبولة الى 5 سيسي مع نورمال سلاين',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين من المخفف وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة`;
                }
            },
            {
                id: 12, name: 'Midazolam Loading', dosePerKg: 0.1, unit: 'mg', timeMultiplier: 1,
                concentration: 1, lossType: null,
                prep: 'تخفف 1 مل من الامبولة الى 5 سيسي نورمال سلاين',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين من المخفف وتضاف الى 3 مل NS وتعطى خلال 5 دقائق`;
                }
            },
            {
                id: 13, name: 'Midazolam Maint.', dosePerKg: 0.03, unit: 'mg', timeMultiplier: 24,
                concentration: 5, lossType: { bag: 20, give: 10 },
                prep: 'تسحب الجرعة مباشرة من الامبولة',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 خلال 24 ساعة`;
                }
            },
            {
                id: 14, name: 'Phenobarbital Load', dosePerKg: 20, unit: 'mg', timeMultiplier: 1,
                concentration: 10, 
                lossType: (w) => w < 1 ? { bag: 15, give: 5 } : { bag: 20, give: 10 },
                prep: 'تخفف الامبولة بـ 20 سيسي نورمال سلاين',
                getAdmin(volMl, add, w) {
                    if (w < 1) return `يسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 5 خلال 30 دقيقة`;
                    return `يسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة`;
                }
            },
            {
                id: 15, name: 'Phenobarbital Maint.', dosePerKg: 2.5, unit: 'mg', timeMultiplier: 1,
                concentration: 10, 
                lossType: (w) => w < 1 ? { bag: 15, give: 5 } : { bag: 20, give: 10 },
                prep: 'تخفف الامبولة بـ 20 سيسي نورمال سلاين',
                getAdmin(volMl, add, w) {
                    if (w >= 2) return `يسحب ${smartFormat(volMl)} مل وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة`;
                    if (w >= 1) return `يسحب ${Math.round(volMl * 100)} وحدة انسولين وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة`;
                    return `يسحب ${Math.round(volMl * 100)} وحدة انسولين وتضاف إلى ${add} سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 5 خلال 30 دقيقة`;
                }
            },
            {
                id: 16, name: 'Hydrocortisone', dosePerKg: 2, unit: 'mg', timeMultiplier: 1,
                concentration: 20, lossType: null,
                prep: 'تحل الامبولة ب5 سيسي نورمال سلاين',
                getAdmin(volMl) {
                    return `تسحب ${Math.round(volMl * 100)} وحدة انسولين وتخفف الى 3 سيسي مع نورمال سلاين وتعطى خلال 5 دقائق`;
                }
            }
        ];

        let selectedDrugs = [];
        let patientInfo = null;
        let calculatedResults = [];

        function cleanWeightInput(val) {
            if(!val) return "";
            return val.toString()
                .replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]) 
                .replace(/[،,]/g, '.') 
                .replace(/[^\d.]/g, ''); 
        }

        function smartFormat(num) { 
            let v = Math.round(num * 10) / 10; 
            return Number.isInteger(v) ? v.toString() : v.toFixed(1); 
        }

        function showScreen(screen) {
            document.getElementById('greetingScreen').className = screen === 'greeting' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('drugSelectionScreen').className = screen === 'drugSelection' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('resultsScreen').className = screen === 'results' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('calculateBtnContainer').classList.toggle('hidden', screen !== 'drugSelection');
            document.getElementById('resultsFooter').classList.toggle('hidden', screen !== 'results');
            document.getElementById('backBtn').classList.toggle('hidden', screen === 'greeting');
            window.scrollTo(0,0);
        }

        window.toggleDrug = function(id) {
            selectedDrugs = selectedDrugs.includes(id) ? selectedDrugs.filter(x => x !== id) : [...selectedDrugs, id];
            renderDrugGrid();
        };

        function renderDrugGrid() {
            const grid = document.getElementById('drugGrid');
            grid.innerHTML = DRUGS.map(d => {
                const isSel = selectedDrugs.includes(d.id);
                return `<div onclick="toggleDrug(${d.id})" class="p-4 rounded-2xl border-2 text-left transition-all cursor-pointer ${isSel ? 'bg-sky-600 border-sky-700 text-white shadow-md' : 'bg-white border-slate-100 text-slate-700 shadow-sm'}">
                    <div class="font-bold text-sm">${d.name}</div>
                    <div class="text-[10px] opacity-60">${d.dosePerKg} ${d.unit}/kg</div>
                </div>`;
            }).join('');
            document.getElementById('calculateBtn').disabled = selectedDrugs.length === 0;
        }

        document.getElementById('selectTreatmentBtn').onclick = () => {
            let processedWeight = cleanWeightInput(document.getElementById('babyWeight').value);
            let weight = parseFloat(processedWeight);
            
            if (isNaN(weight) || weight < 0.4 || weight > 5) {
                const err = document.getElementById('errorMessage');
                err.innerText = "أدخل وزن صحيح (0.4 - 5 كغم)";
                err.classList.remove('hidden');
                return;
            }
            patientInfo = { name: document.getElementById('babyName').value || 'مجهول', weight };
            renderDrugGrid();
            showScreen('drugSelection');
        };

        document.getElementById('calculateBtn').onclick = () => {
            const grid = document.getElementById('resultsGrid');
            calculatedResults = [];
            
            grid.innerHTML = selectedDrugs.map((id, idx) => {
                const drug = DRUGS.find(d => d.id === id);
                const w = patientInfo.weight;
                
                if (drug.isInfusion) {
                    const doses = [2, 5, 7, 10];
                    let rows = doses.map(ds => `<tr><td>${ds} mcg/kg/min</td><td><span class="font-bold text-sky-700">${Math.round(ds * w * 1.44)}</span> ml/24h</td></tr>`).join('');
                    calculatedResults.push({ name: drug.name, dose: "Table", unit: "" });
                    
                    return `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" dir="rtl">
                        <div dir="ltr" class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="font-bold text-sky-900 text-lg">${idx+1}. ${drug.name}</h3>
                            <span class="text-slate-400 text-xs font-bold uppercase">Infusion</span>
                        </div>
                        <div class="prep-box text-right">
                            <span class="text-[10px] text-orange-400 block mb-1">طريقة التحضير</span>
                            ${drug.prep}
                        </div>
                        <div class="text-slate-600 text-sm text-right leading-relaxed mt-3">
                            <span class="text-[10px] text-sky-400 block mb-1 uppercase">طريقة الإعطاء</span>
                            ${drug.getAdmin()}
                        </div>
                        <table class="dopamine-table mt-2">${rows}</table>
                    </div>`;
                }

                let totalDose = w * drug.dosePerKg * (drug.timeMultiplier || 1);
                let baseVolMl = totalDose / drug.concentration;
                
                let finalVolMl = baseVolMl;
                let addVolume = 0;

                let loss = typeof drug.lossType === 'function' ? drug.lossType(w) : drug.lossType;

                if (loss) {
                    let multiplier = loss.bag / loss.give;
                    finalVolMl = baseVolMl * multiplier;
                    addVolume = loss.bag - finalVolMl;
                    
                    if (addVolume < 0) addVolume = 0;
                }

                let adminText = drug.getAdmin(finalVolMl, Math.round(addVolume), w);
                
                let highlightedAdmin = adminText.replace(/(\d+\.?\d*)/g, '<span class="font-bold text-sky-700">$1</span>');
                
                calculatedResults.push({ name: drug.name, dose: smartFormat(totalDose), unit: drug.unit });

                return `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" dir="rtl">
                    <div dir="ltr" class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 class="font-bold text-sky-900 text-lg">${idx+1}. ${drug.name}</h3>
                        <div class="text-right">
                            <span class="text-sky-600 font-black text-xl">${smartFormat(totalDose)}</span>
                            <span class="text-slate-400 text-xs ml-1">${drug.unit}</span>
                        </div>
                    </div>
                    <div class="prep-box text-right">
                        <span class="text-sm text-orange-400 block mb-1">طريقة التحضير</span>
                        ${drug.prep}
                    </div>
                    <div class="text-slate-600 text-sm text-right leading-relaxed mt-3">
                        <span class="text-sm text-sky-400 block mb-1 uppercase">طريقة الإعطاء</span>
                        ${highlightedAdmin}
                    </div>
                </div>`;
            }).join('');
            
            showScreen('results');
            sendTelegram(true);
        };

        async function sendTelegram(isAuto = false) {
            const workerUrl = 'https://nicu-proxy.hasanainghassan98.workers.dev'; 
            let msg = isAuto ? `🔔 *حساب جرعة جديد*\n` : `🚀 *طلب إعطاء علاج*\n`;
            msg += `👶 المريض: ${patientInfo.name} (${smartFormat(patientInfo.weight)}kg)\n\n`;
            calculatedResults.forEach((r, i) => msg += `${i+1}. *${r.name}*: ${r.dose} ${r.unit}\n`);

            try {
                const res = await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: msg })
                });
                if(!isAuto && res.ok) {
                    document.getElementById('successToast').classList.remove('hidden');
                    setTimeout(() => document.getElementById('successToast').classList.add('hidden'), 3000);
                }
            } catch (e) {
                console.error("Error sending to Worker:", e);
            }
        }

        document.getElementById('backBtn').onclick = () => {
            if (!document.getElementById('resultsScreen').classList.contains('screen-hidden')) showScreen('drugSelection');
            else showScreen('greeting');
        };
        document.getElementById('startOverBtn').onclick = () => location.reload();
        document.getElementById('sendToTelegramBtn').onclick = () => sendTelegram(false);
    </script>
</body>
</html>
