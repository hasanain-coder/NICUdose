<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator | Baghdad Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .screen-hidden { display: none !important; }
        .screen-visible { display: block !important; }
        
        input {
            border: 2px solid #e2e8f0 !important;
            padding: 0.85rem !important;
            border-radius: 1rem !important;
            text-align: center;
            width: 100%;
        }

        .prep-box {
            background-color: #fff7ed;
            border-right: 4px solid #f97316;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #7c2d12;
            font-weight: 600;
        }

        .dopamine-table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
            font-size: 0.85rem;
            direction: ltr;
        }
        .dopamine-table th, .dopamine-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: center;
        }
        .dopamine-table th { background: #f8fafc; color: #475569; }

        .toast { animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="toastContainer" class="fixed top-4 left-0 right-0 z-50 flex justify-center pointer-events-none">
        <div id="successToast" class="toast bg-emerald-600 text-white px-6 py-3 rounded-full shadow-lg hidden pointer-events-auto">
            ✅ تم إبلاغ الصيدلية بنجاح!
        </div>
    </div>

    <header class="bg-sky-600 text-white p-5 shadow-lg sticky top-0 z-40">
        <div class="flex items-center justify-between max-w-4xl mx-auto">
            <button id="backBtn" class="bg-white/20 p-2 rounded-xl hidden"> 🔙 </button>
            <div class="flex-1 text-center">
                <h1 class="text-xl font-bold">حاسبة جرعات الخدج</h1>
                <p class="text-[10px] text-sky-100 uppercase tracking-widest">Baghdad Teaching Hospital</p>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4">
        <div id="greetingScreen" class="screen-visible max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl mt-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">معلومات المريض</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">اسم الطفل</label>
                    <input id="babyName" type="text" placeholder="أدخل اسم الطفل">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">الوزن (كجم) - يقبل الأرقام العربية</label>
                    <input id="babyWeight" type="text" inputmode="decimal" placeholder="مثال: ١.٥ أو 1.5">
                </div>
                <div id="errorMessage" class="text-red-500 text-sm font-bold text-center hidden bg-red-50 p-2 rounded-lg"></div>
                <button id="selectTreatmentBtn" class="w-full bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    اختيار العلاج
                </button>
            </div>
        </div>

        <div id="drugSelectionScreen" class="screen-hidden max-w-4xl mx-auto">
            <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">اختر الأدوية (A-Z)</h2>
            <div id="drugGrid" dir="ltr" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-40"></div>
        </div>

        <div id="resultsScreen" class="screen-hidden max-w-2xl mx-auto">
            <div id="resultsGrid" class="space-y-4 pb-80"></div>
        </div>
    </main>

    <div id="calculateBtnContainer" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 hidden z-50">
        <button id="calculateBtn" class="w-full max-w-4xl mx-auto block bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-lg disabled:opacity-50">
            حساب النتائج
        </button>
    </div>

    <div id="resultsFooter" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t p-4 hidden z-50">
        <div class="max-w-md mx-auto space-y-3">
            <button id="sendToTelegramBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                🚀 تبليغ الصيادلة بالإعطاء
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button id="startOverBtn" class="bg-slate-100 text-slate-700 py-3 rounded-xl font-semibold border active:scale-95"> 🔄 جديد </button>
                <a href="https://t.me/NICU_BTHbot" target="_blank" class="bg-emerald-50 text-emerald-700 py-3 rounded-xl font-semibold border flex items-center justify-center gap-1"> 💬 تواصل </a>
            </div>
        </div>
    </div>

    <script>
        const PREPS = {
            1: 'تحل الفيالة بـ 10 سيسي نورمال سلاين',
            2: 'تخفف حسب البروتوكول المعتمد للقسم',
            9: '1 مل (40 ملغم) دوبامين + 39 مل جلوكوز ووتر (المجموع 40 مل)'
        };

        const DRUGS = [
            { id: 1, name: 'Amoxicillin', dosePerKg: 50, unit: 'mg', factor: 1, methodIndex: 1, prepIndex: 1, timeMultiplier: 1 },
            { id: 2, name: 'Gentamicin', dosePerKg: 5, unit: 'mg', factor: 12.5, methodIndex: 2, prepIndex: 2, timeMultiplier: 1 },
            { id: 3, name: 'Caffeine Loading', dosePerKg: 20, unit: 'mg', factor: 2, methodIndex: 3, prepIndex: 2, timeMultiplier: 1 },
            { id: 4, name: 'Caffeine Maintenance', dosePerKg: 10, unit: 'mg', factor: 50, methodIndex: 4, prepIndex: 2, timeMultiplier: 1 },
            { id: 5, name: 'Colistin Loading', dosePerKg: 150000, unit: 'IU', factor: 30, methodIndex: 5, prepIndex: 2, timeMultiplier: 1 },
            { id: 6, name: 'Colistin Maintenance', dosePerKg: 37500, unit: 'IU', factor: 7.5, methodIndex: 6, prepIndex: 2, timeMultiplier: 1 },
            { id: 7, name: 'Tigecycline', dosePerKg: 2, unit: 'mg', factor: 2, methodIndex: 7, prepIndex: 2, timeMultiplier: 1 },
            { id: 8, name: 'Meropenem', dosePerKg: 40, unit: 'mg', factor: 1.6, methodIndex: 8, prepIndex: 2, timeMultiplier: 1 },
            { id: 9, name: 'Dopamine', dosePerKg: 5, unit: 'mcg', factor: 36, methodIndex: 9, prepIndex: 9, timeMultiplier: 1440 },
            { id: 10, name: 'Dexmedetomidine', dosePerKg: 0.3, unit: 'mcg', factor: 14.4, methodIndex: 10, prepIndex: 2, timeMultiplier: 24 },
            { id: 11, name: 'Dexmedetomidine Loading', dosePerKg: 0.1, unit: 'mcg', factor: 5, methodIndex: 11, prepIndex: 2, timeMultiplier: 1 },
            { id: 12, name: 'Midazolam Loading', dosePerKg: 0.1, unit: 'mg', factor: 10, methodIndex: 12, prepIndex: 2, timeMultiplier: 1 },
            { id: 13, name: 'Midazolam Maintenance', dosePerKg: 0.03, unit: 'mg', factor: 14.4, methodIndex: 13, prepIndex: 2, timeMultiplier: 24 },
            { id: 14, name: 'Phenobarbital Loading', dosePerKg: 20, unit: 'mg', factor: 4, methodIndex: 14, prepIndex: 2, timeMultiplier: 1 },
            { id: 15, name: 'Phenobarbital Maintenance', dosePerKg: 2.5, unit: 'mg', factor: 0.5, methodIndex: 15, prepIndex: 2, timeMultiplier: 1 },
            { id: 16, name: 'Hydrocortisone', dosePerKg: 2, unit: 'mg', factor: 10, methodIndex: 16, prepIndex: 2, timeMultiplier: 1 }
        ];

        const METHODS = {
            1: 'تسحب ** مل وتعطى خلال 5 دقائق',
            2: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            3: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة',
            4: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            5: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            6: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            7: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة',
            8: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة',
            9: 'عن طريق جهاز الإعطاء المستمر بالسرعات الموضحة أدناه.',
            10: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 خلال 24 ساعة',
            11: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة',
            12: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 5 دقائق',
            13: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 خلال 24 ساعة',
            14: 'تخفف الامبولة الى 20 سيسي، يسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة',
            15: 'تخفف الامبولة الى 20 سيسي، يسحب ** وحدة انسولين وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 خلال 30 دقيقة',
            16: 'تسحب ** وحدة انسولين وتخفف الى 3 سيسي مع نورمال سلاين وتعطى خلال 5 دقائق'
        };

        let selectedDrugs = [];
        let patientInfo = null;
        let calculatedResults = [];

        // دالة تحويل الأرقام العربية إلى إنجليزية
        function convertArabicNums(str) {
            return str.replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]).replace(/،/g, '.');
        }

        function smartFormat(num) { 
            let v = Math.round(num * 10) / 10; 
            return Number.isInteger(v) ? v.toString() : v.toFixed(1); 
        }

        function showScreen(screen) {
            document.getElementById('greetingScreen').className = screen === 'greeting' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('drugSelectionScreen').className = screen === 'drugSelection' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('resultsScreen').className = screen === 'results' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('calculateBtnContainer').classList.toggle('hidden', screen !== 'drugSelection');
            document.getElementById('resultsFooter').classList.toggle('hidden', screen !== 'results');
            document.getElementById('backBtn').classList.toggle('hidden', screen === 'greeting');
            window.scrollTo(0,0);
        }

        window.toggleDrug = function(id) {
            selectedDrugs = selectedDrugs.includes(id) ? selectedDrugs.filter(x => x !== id) : [...selectedDrugs, id];
            renderDrugGrid();
        };

        function renderDrugGrid() {
            const grid = document.getElementById('drugGrid');
            grid.innerHTML = DRUGS.map(d => {
                const isSel = selectedDrugs.includes(d.id);
                return `<div onclick="toggleDrug(${d.id})" class="p-4 rounded-2xl border-2 text-left transition-all cursor-pointer ${isSel ? 'bg-sky-600 border-sky-700 text-white shadow-md' : 'bg-white border-slate-100 text-slate-700 shadow-sm'}">
                    <div class="font-bold text-sm">${d.name}</div>
                    <div class="text-[10px] opacity-60">${d.dosePerKg} ${d.unit}/kg</div>
                </div>`;
            }).join('');
            document.getElementById('calculateBtn').disabled = selectedDrugs.length === 0;
        }

        async function sendTelegram(isAuto = false) {
            const token = '8554444620:AAEKG5brSd0RFQ-NftjIHp7OJtqJRhQuJog';
            const chatId = '-1002141194993';
            let msg = isAuto ? `🔔 *حساب جرعة جديد*\n` : `🚀 *طلب إعطاء علاج*\n`;
            msg += `👶 المريض: ${patientInfo.name} (${smartFormat(patientInfo.weight)}kg)\n\n`;
            calculatedResults.forEach((r, i) => msg += `${i+1}. *${r.name}*: ${r.dose} ${r.unit}\n`);
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'Markdown' })
                });
                if(!isAuto && res.ok) {
                    document.getElementById('successToast').classList.remove('hidden');
                    setTimeout(() => document.getElementById('successToast').classList.add('hidden'), 3000);
                }
            } catch (e) {}
        }

        document.getElementById('selectTreatmentBtn').onclick = () => {
            let rawWeight = document.getElementById('babyWeight').value;
            let weight = parseFloat(convertArabicNums(rawWeight));
            
            if (isNaN(weight) || weight < 0.4 || weight > 6) {
                const err = document.getElementById('errorMessage');
                err.innerText = "أدخل وزن صحيح (مثال: 1.5)";
                err.classList.remove('hidden');
                return;
            }
            patientInfo = { name: document.getElementById('babyName').value || 'مجهول', weight };
            renderDrugGrid();
            showScreen('drugSelection');
        };

        document.getElementById('calculateBtn').onclick = () => {
            const grid = document.getElementById('resultsGrid');
            calculatedResults = [];
            grid.innerHTML = selectedDrugs.map((id, idx) => {
                const drug = DRUGS.find(d => d.id === id);
                let dose = patientInfo.weight * drug.dosePerKg * drug.timeMultiplier;
                
                // حالة الدوبامين
                if (id === 9) {
                    const doses = [2, 5, 7, 10];
                    let rows = doses.map(ds => `<tr><td>${ds} mcg</td><td>${Math.round(ds * patientInfo.weight * 1.44)} ml/24h</td></tr>`).join('');
                    calculatedResults.push({ name: drug.name, dose: "Table", unit: "" });
                    return `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" dir="rtl">
                        <div dir="ltr" class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="font-bold text-sky-900 text-lg">${drug.name}</h3>
                            <span class="text-slate-400 text-xs uppercase font-bold">Infusion</span>
                        </div>
                        <div class="prep-box text-right">طريقة التحضير: ${PREPS[9]}</div>
                        <table class="dopamine-table">${rows}</table>
                    </div>`;
                }

                // منطق الحساب
                let factor = drug.factor;
                let meth = METHODS[drug.methodIndex];
                if (patientInfo.weight < 1) {
                    if ([3, 7, 8].includes(id)) {
                        factor = (id === 8) ? 2.4 : 3;
                        meth = meth.replace('10 سيسي ويعطى 10', '10 سيسي ويعطى 5').replace('##', '^^');
                    }
                    if (id === 1) { factor = 100; meth = 'تسحب ** وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق'; }
                }

                let volVal = patientInfo.weight * factor;
                let volFinal = meth.includes('وحدة انسولين') ? Math.round(volVal) : smartFormat(volVal);
                let finalMeth = meth.replace('**', volFinal).replace('##', smartFormat(20 - parseFloat(volFinal))).replace('^^', smartFormat(15 - parseFloat(volFinal)));

                calculatedResults.push({ name: drug.name, dose: smartFormat(dose), unit: drug.unit });

                // عرض النتيجة: الاسم يسار، الجرعة يمين
                return `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" dir="rtl">
                    <div dir="ltr" class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 class="font-bold text-sky-900 text-lg">${idx+1}. ${drug.name}</h3>
                        <div class="text-right">
                            <span class="text-sky-600 font-black text-xl">${smartFormat(dose)}</span>
                            <span class="text-slate-400 text-xs ml-1">${drug.unit}</span>
                        </div>
                    </div>
                    <div class="prep-box text-right">
                        <span class="text-[10px] text-orange-400 block mb-1">طريقة التحضير</span>
                        ${PREPS[drug.prepIndex] || PREPS[2]}
                    </div>
                    <div class="text-slate-700 text-sm font-bold text-right leading-relaxed">
                        <span class="text-[10px] text-sky-400 block mb-1 uppercase">طريقة الإعطاء</span>
                        ${finalMeth}
                    </div>
                </div>`;
            }).join('');
            showScreen('results');
            sendTelegram(true);
        };

        document.getElementById('backBtn').onclick = () => {
            if (!document.getElementById('resultsScreen').classList.contains('screen-hidden')) showScreen('drugSelection');
            else showScreen('greeting');
        };
        document.getElementById('startOverBtn').onclick = () => location.reload();
        document.getElementById('sendToTelegramBtn').onclick = () => sendTelegram(false);
    </script>
</body>
</html>
