<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator | حاسبة الجرعات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .screen-hidden {
            display: none !important;
        }

        .screen-visible {
            display: block !important;
        }

        input {
            border: 2px solid #93c5fd !important;
            padding: 0.75rem 1rem !important;
            border-radius: 0.5rem !important;
            background-color: white !important;
            text-align: center;
        }

        .action-btn {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            border-radius: 12px !important;
            width: 100%;
            font-weight: bold;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .toast {
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-cyan-50 to-teal-50 min-h-screen flex flex-col">

    <div id="toastContainer" class="fixed top-4 left-0 right-0 z-50 flex justify-center pointer-events-none">
        <div id="successToast" class="toast bg-emerald-600 text-white px-6 py-4 rounded-xl shadow-2xl hidden pointer-events-auto">
            <div class="flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                <span class="font-bold">تم إبلاغ الصيدلية بنجاح!</span>
            </div>
        </div>
    </div>

    <header class="bg-gradient-to-l from-sky-500 to-teal-500 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6 text-center">
            <div class="flex items-center justify-between">
                <button id="backBtn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg hidden">
                    ← رجوع
                </button>
                <div class="flex-1 text-center">
                    <h1 class="text-2xl md:text-3xl font-bold">حاسبة الجرعات</h1>
                    <p class="text-sky-100 text-sm">مستشفى بغداد التعليمي - NICU</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 px-4 py-8">
        <div id="greetingScreen" class="screen-visible">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border-2 border-sky-100 p-6 space-y-6">
                <h2 class="text-xl font-bold text-sky-800 text-center">معلومات المريض</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sky-700 font-semibold mb-1">اسم الطفل</label>
                        <input id="babyName" type="text" class="w-full" placeholder="أدخل اسم الطفل">
                    </div>
                    <div>
                        <label class="block text-sky-700 font-semibold mb-1">الوزن (كجم)</label>
                        <input id="babyWeight" type="text" class="w-full" placeholder="مثال: 2.5">
                    </div>
                    <div id="errorMessage" class="text-red-600 text-sm font-bold text-center hidden"></div>
                    
                    <button id="selectTreatmentBtn" class="w-full bg-sky-600 text-white py-4 rounded-xl font-bold shadow-lg">
                        اختيار العلاج
                    </button>
                </div>
            </div>
        </div>

        <div id="drugSelectionScreen" class="screen-hidden">
            <div class="max-w-4xl mx-auto">
                <div id="drugGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-32"></div>
            </div>
        </div>

        <div id="resultsScreen" class="screen-hidden">
            <div class="max-w-4xl mx-auto pb-48">
                <div id="resultsGrid" class="grid grid-cols-1 gap-6"></div>
            </div>
        </div>
    </main>

    <div id="calculateBtnContainer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 hidden">
        <button id="calculateBtn" class="w-full max-w-4xl mx-auto block bg-gradient-to-l from-sky-500 to-teal-500 text-white py-4 rounded-xl font-bold shadow-lg disabled:opacity-50">
            حساب الجرعات وإبلاغ البوت
        </button>
    </div>

    <div id="resultsFooter" class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 hidden shadow-[0_-5px_20px_rgba(0,0,0,0.1)]">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <button id="sendToTelegramBtn" class="action-btn bg-blue-600 text-white">
                تبليغ الصيادلة باعطاء العلاج
            </button>
            <button id="startOverBtn" class="action-btn bg-white border-2 border-emerald-500 text-emerald-700">
                🔄 بدء جديد
            </button>
            <a href="https://t.me/NICU_BTHbot" target="_blank" class="action-btn bg-emerald-600 text-white">
                تواصل مع الصيادلة
            </a>
        </div>
    </div>

    <script>
        const DRUGS = [
            { id: 1, name: 'Amoxicillin', dosePerKg: 50, unit: 'mg', factor: 1, methodIndex: 1, timeMultiplier: 1 },
            { id: 2, name: 'Gentamicin', dosePerKg: 5, unit: 'mg', factor: 12.5, methodIndex: 2, timeMultiplier: 1 },
            { id: 3, name: 'Caffeine Loading', dosePerKg: 20, unit: 'mg', factor: 2, methodIndex: 3, timeMultiplier: 1 },
            { id: 4, name: 'Caffeine Maintenance', dosePerKg: 10, unit: 'mg', factor: 50, methodIndex: 4, timeMultiplier: 1 },
            { id: 5, name: 'Colistin Loading', dosePerKg: 150000, unit: 'IU', factor: 30, methodIndex: 5, timeMultiplier: 1 },
            { id: 6, name: 'Colistin Maintenance', dosePerKg: 37500, unit: 'IU', factor: 7.5, methodIndex: 6, timeMultiplier: 1 },
            { id: 7, name: 'Tigecycline', dosePerKg: 2, unit: 'mg', factor: 2, methodIndex: 7, timeMultiplier: 1 },
            { id: 8, name: 'Meropenem', dosePerKg: 40, unit: 'mg', factor: 1.6, methodIndex: 8, timeMultiplier: 1 },
            { id: 9, name: 'Dopamine', dosePerKg: 5, unit: 'mcg', factor: 36, methodIndex: 9, timeMultiplier: 1440 },
            { id: 10, name: 'Dexmedetomidine', dosePerKg: 0.3, unit: 'mcg', factor: 14.4, methodIndex: 10, timeMultiplier: 24 },
            { id: 11, name: 'Dexmedetomidine Loading', dosePerKg: 0.1, unit: 'mcg', factor: 5, methodIndex: 11, timeMultiplier: 1 },
            { id: 12, name: 'Midazolam Loading', dosePerKg: 0.1, unit: 'mg', factor: 10, methodIndex: 12, timeMultiplier: 1 },
            { id: 13, name: 'Midazolam Maintenance', dosePerKg: 0.03, unit: 'mg', factor: 14.4, methodIndex: 13, timeMultiplier: 24 },
            { id: 14, name: 'Phenobarbital Loading', dosePerKg: 20, unit: 'mg', factor: 4, methodIndex: 14, timeMultiplier: 1 },
            { id: 15, name: 'Phenobarbital Maintenance', dosePerKg: 2.5, unit: 'mg', factor: 0.5, methodIndex: 15, timeMultiplier: 1 },
            { id: 16, name: 'Hydrocortisone', dosePerKg: 2, unit: 'mg', factor: 10, methodIndex: 16, timeMultiplier: 1 }
        ];

        const METHODS = {
            1: 'تسحب ** مل وتعطى خلال 5 دقائق',
            2: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            3: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            4: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق',
            5: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            6: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق',
            7: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            8: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة',
            9: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            10: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            11: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة',
            12: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 5 دقائق',
            13: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة',
            14: 'تخفف الامبولة الى 20 سيسي، يسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة',
            15: 'تخفف الامبولة الى 20 سيسي، يسحب ** وحدة انسولين وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة',
            16: 'تسحب ** وحدة انسولين وتخفف الى 3 سيسي مع نورمال سلاين وتعطى خلال 5 دقائق'
        };

        let selectedDrugs = [];
        let patientInfo = null;
        let calculatedResults = [];

        function normalizeNum(s) {
            if(!s) return "";
            let res = s.replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]); 
            res = res.replace(/،/g, '.'); 
            return res;
        }

        function smartFormat(num) {
            let val = Math.round(num * 10) / 10;
            return Number.isInteger(val) ? val.toString() : val.toFixed(1);
        }

        function showScreen(screen) {
            document.getElementById('greetingScreen').className = screen === 'greeting' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('drugSelectionScreen').className = screen === 'drugSelection' ? 'screen-visible' : 'screen-hidden';
            document.getElementById('resultsScreen').className = screen === 'results' ? 'screen-visible' : 'screen-hidden';
            
            document.getElementById('calculateBtnContainer').classList.toggle('hidden', screen !== 'drugSelection');
            document.getElementById('resultsFooter').classList.toggle('hidden', screen !== 'results');
            document.getElementById('backBtn').classList.toggle('hidden', screen === 'greeting');
            
            window.scrollTo(0,0);
        }

        window.toggleDrug = function(id) {
            if (selectedDrugs.includes(id)) {
                selectedDrugs = selectedDrugs.filter(x => x !== id);
            } else {
                selectedDrugs = [...selectedDrugs, id];
            }
            renderDrugGrid();
        };

        function renderDrugGrid() {
            const grid = document.getElementById('drugGrid');
            grid.innerHTML = DRUGS.map(d => {
                const isSel = selectedDrugs.includes(d.id);
                return `
                    <div onclick="toggleDrug(${d.id})" class="p-5 rounded-xl border-2 cursor-pointer transition-all ${isSel ? 'bg-sky-600 border-sky-700 text-white' : 'bg-white border-sky-100 text-sky-800'}">
                        <div class="font-bold text-lg text-left" dir="ltr">${d.name}</div>
                        <div class="text-xs opacity-70 text-left" dir="ltr">${d.dosePerKg} ${d.unit}/kg</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('calculateBtn').disabled = selectedDrugs.length === 0;
        }

        async function sendTelegram(isAuto = false) {
            const token = '8554444620:AAEKG5brSd0RFQ-NftjIHp7OJtqJRhQuJog';
            const chatId = '-1002141194993';
            
            let msg = isAuto ? `🔔 *عملية حسابية جديدة*\n` : `🚀 *طلب تأكيد إعطاء علاج*\n`;
            msg += `👶 المريض: ${patientInfo.name} (${smartFormat(patientInfo.weight)}kg)\n\n`;
            
            calculatedResults.forEach((r, i) => {
                msg += `${i+1}. *${r.name}*: ${r.dose} ${r.unit}\n`;
            });

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });

                if(!isAuto && response.ok) {
                    document.getElementById('successToast').classList.remove('hidden');
                    setTimeout(() => {
                        document.getElementById('successToast').classList.add('hidden');
                    }, 3000);
                }
            } catch (e) {
                console.error("Telegram Error");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            
            document.getElementById('selectTreatmentBtn').onclick = () => {
                const weightStr = normalizeNum(document.getElementById('babyWeight').value);
                const weight = parseFloat(weightStr);
                const err = document.getElementById('errorMessage');

                if (isNaN(weight) || weight <= 0) {
                    err.innerText = "الرجاء إدخال وزن صحيح";
                    err.classList.remove('hidden');
                    return;
                }
                
                if (weight < 0.5 || weight > 5) {
                    err.innerText = "⚠️ الوزن المسموح به بين 0.5 و 5 كجم فقط";
                    err.classList.remove('hidden');
                    return;
                }

                err.classList.add('hidden');
                patientInfo = {
                    name: document.getElementById('babyName').value.trim() || 'مجهول',
                    weight: weight
                };
                
                renderDrugGrid();
                showScreen('drugSelection');
            };

            document.getElementById('calculateBtn').onclick = () => {
                const grid = document.getElementById('resultsGrid');
                calculatedResults = [];
                const isTiny = patientInfo.weight < 1;

                grid.innerHTML = selectedDrugs.map((id, idx) => {
                    const drug = DRUGS.find(d => d.id === id);
                    let dose = patientInfo.weight * drug.dosePerKg * drug.timeMultiplier;
                    
                    if (id === 9) {
                        dose /= 1000;
                    }

                    let factor = drug.factor;
                    let meth = METHODS[drug.methodIndex];

                    if (isTiny) {
                        if ([3, 7, 8].includes(id)) {
                            factor = (id === 8) ? 2.4 : 3;
                            meth = meth.replace('10 سيسي ويعطى 10', '10 سيسي ويعطى 5').replace('##', '^^');
                        }
                        if (id === 1) {
                            factor = 100;
                            meth = 'تسحب ** وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق';
                        }
                        if (id === 14) {
                            factor = 6;
                            meth = meth.replace('10 سيسي وتعطى 10', '10 سيسي وتعطى 5').replace('##', '^^');
                        }
                    }

                    if (id === 15) {
                        if (patientInfo.weight >= 2) {
                            factor = 0.5;
                        } else if (patientInfo.weight >= 1) {
                            factor = 50;
                        } else {
                            factor = 75;
                            meth = meth.replace('20 سيسي', '15 سيسي').replace('تعطى 10', 'تعطى 5');
                        }
                    }

                    let volVal = patientInfo.weight * factor;
                    let vol = smartFormat(volVal);
                    
                    let finalMeth = meth.replace('**', vol)
                                        .replace('##', smartFormat(20 - parseFloat(vol)))
                                        .replace('^^', smartFormat(15 - parseFloat(vol)));

                    calculatedResults.push({
                        name: drug.name,
                        dose: smartFormat(dose),
                        unit: id === 9 ? 'mg' : drug.unit
                    });

                    return `
                        <div class="bg-white p-5 rounded-2xl shadow-md border-r-8 border-sky-500">
                            <h3 class="font-bold text-sky-900 text-left text-2xl mb-1" dir="ltr">${idx+1}. ${drug.name}</h3>
                            <div class="text-2xl font-black text-sky-600 mb-3 text-left" dir="ltr">
                                ${smartFormat(dose)} 
                                <span class="text-sm font-normal text-gray-500">${id === 9 ? 'mg' : drug.unit}</span>
                            </div>
                            <p class="text-gray-700 leading-relaxed text-right" dir="rtl">${finalMeth}</p>
                        </div>
                    `;
                }).join('');

                showScreen('results');
                sendTelegram(true);
            };

            document.getElementById('backBtn').onclick = () => {
                const resultsVisible = !document.getElementById('resultsScreen').className.includes('screen-hidden');
                if (resultsVisible) {
                    showScreen('drugSelection');
                } else {
                    showScreen('greeting');
                }
            };

            document.getElementById('startOverBtn').onclick = () => {
                location.reload();
            };

            document.getElementById('sendToTelegramBtn').onclick = () => {
                sendTelegram(false);
            };
        });
    </script>
</body>
</html>
