<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Dose Calculator - Baghdad Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .screen-hidden { display: none !important; }
        .screen-visible { display: block !important; }
        input {
            border: 2px solid #bae6fd !important;
            padding: 0.8rem !important;
            border-radius: 0.75rem !important;
            text-align: center;
            font-size: 1.1rem;
            width: 100%;
        }
        .action-btn {
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800">

    <header class="bg-sky-600 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-black">حاسبة جرعات NICU</h1>
        <p class="text-sky-100 text-xs">مستشفى بغداد التعليمي</p>
    </header>

    <main class="flex-1 p-4 max-w-4xl mx-auto w-full">
        <div id="screen1" class="screen-visible space-y-6 mt-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">اسم الطفل</label>
                    <input id="babyName" type="text" placeholder="أدخل الاسم">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">الوزن الحالي (كجم)</label>
                    <input id="babyWeight" type="text" inputmode="decimal" placeholder="من 0.5 إلى 5">
                </div>
                <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm font-bold text-center border border-red-100"></div>
                
                <button id="toScreen2" class="w-full bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-lg">
                    ابدأ اختيار الأدوية
                </button>
            </div>
        </div>

        <div id="screen2" class="screen-hidden">
            <div id="drugGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-40"></div>
        </div>

        <div id="screen3" class="screen-hidden space-y-4 pb-52">
            <div id="resultsContent" class="space-y-4"></div>
        </div>
    </main>

    <div id="footerCalc" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 hidden">
        <button id="calculateBtn" class="max-w-4xl mx-auto block w-full bg-sky-600 text-white py-4 rounded-2xl font-bold">حساب الجرعات</button>
    </div>

    <div id="footerResults" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 hidden shadow-2xl">
        <div class="max-w-md mx-auto space-y-2">
            <button onclick="location.reload()" class="action-btn bg-slate-100 text-slate-700">🔄 مريض جديد</button>
        </div>
    </div>

    <script>
        // ... (نفس مصفوفة الأدوية DRUGS السابقة بدون تغيير) ...
        const DRUGS = [
            { id: 1, name: 'Amoxicillin', dose: 50, unit: 'mg', factor: 1, m: 1 },
            { id: 2, name: 'Gentamicin', dose: 5, unit: 'mg', factor: 12.5, m: 2 },
            { id: 3, name: 'Caffeine Loading', dose: 20, unit: 'mg', factor: 2, m: 3 },
            { id: 4, name: 'Caffeine Maintenance', dose: 10, unit: 'mg', factor: 50, m: 4 },
            { id: 5, name: 'Colistin Loading', dose: 150000, unit: 'IU', factor: 30, m: 5 },
            { id: 6, name: 'Colistin Maintenance', dose: 37500, unit: 'IU', factor: 7.5, m: 6 },
            { id: 7, name: 'Tigecycline', dose: 2, unit: 'mg', factor: 2, m: 7 },
            { id: 8, name: 'Meropenem', dose: 40, unit: 'mg', factor: 1.6, m: 8 },
            { id: 9, name: 'Dopamine', dose: 5, unit: 'mcg', factor: 36, m: 9, time: 1440 },
            { id: 10, name: 'Dexmedetomidine', dose: 0.3, unit: 'mcg', factor: 14.4, m: 10, time: 24 },
            { id: 11, name: 'Dex Loading', dose: 0.1, unit: 'mcg', factor: 5, m: 11 },
            { id: 12, name: 'Midazolam Loading', dose: 0.1, unit: 'mg', factor: 10, m: 12 },
            { id: 13, name: 'Midazolam Main.', dose: 0.03, unit: 'mg', factor: 14.4, m: 13, time: 24 },
            { id: 14, name: 'Phenobarbital Loading', dose: 20, unit: 'mg', factor: 4, m: 14 },
            { id: 15, name: 'Phenobarbital Main.', dose: 2.5, unit: 'mg', factor: 0.5, m: 15 }
        ];

        const TEXTS = { 1: 'تسحب ** مل وتعطى خلال 5 دقائق', 2: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق', 3: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة', 4: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 10 دقائق', 5: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق', 6: 'تسحب ** وحدة انسولين وتخفف بـ 5 سيسي كلوكوز وتر ويعطى خلال 5 دقائق', 7: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة', 8: 'تسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 30 دقيقة', 9: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة', 10: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة', 11: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 15 دقيقة', 12: 'تخفف الامبولة الى 5 مل، تسحب ** وحدة انسولين وتضاف الى 3 مل NS وتعطى خلال 5 دقائق', 13: 'تسحب ** وحدة انسولين وتضاف إلى 20 سيسي كلوكوز وتر، تفرغ 10 سيسي ويعطى 10 سيسي خلال 24 ساعة', 14: 'تخفف الامبولة الى 20 سيسي، يسحب ** مل وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة', 15: 'تخفف الامبولة الى 20 سيسي، يسحب ** وحدة انسولين وتضاف إلى ## سيسي كلوكوز وتر، تفرغ 10 سيسي وتعطى 10 سيسي خلال 30 دقيقة' };

        let selected = [], weight = 0, name = "";

        function cleanNum(s) {
            if(!s) return 0;
            let n = s.toString().replace(/[٠-٩]/g, d => '0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]);
            n = n.replace(/،/g, '.').replace(/,/g, '.');
            return parseFloat(n) || 0;
        }

        function smart(n) {
            let val = Math.round(n * 10) / 10;
            return Number.isInteger(val) ? val.toString() : val.toFixed(1);
        }

        function toggleScreen(s) {
            document.getElementById('screen1').className = s==1?'screen-visible':'screen-hidden';
            document.getElementById('screen2').className = s==2?'screen-visible':'screen-hidden';
            document.getElementById('screen3').className = s==3?'screen-visible':'screen-hidden';
            document.getElementById('footerCalc').style.display = s==2?'block':'none';
            document.getElementById('footerResults').style.display = s==3?'block':'none';
        }

        // الوظيفة المحدثة مع شرط الوزن
        document.getElementById('toScreen2').onclick = () => {
            weight = cleanNum(document.getElementById('babyWeight').value);
            name = document.getElementById('babyName').value || "مجهول";
            const err = document.getElementById('errorMessage');

            if(weight < 0.5 || weight > 5) {
                err.innerText = "⚠️ الوزن المسموح به بين 0.5 و 5 كجم فقط";
                err.classList.remove('hidden');
                return;
            }

            err.classList.add('hidden');
            renderGrid();
            toggleScreen(2);
        }

        function renderGrid() {
            const container = document.getElementById('drugGrid');
            container.innerHTML = DRUGS.map(d => {
                const isActive = selected.includes(d.id);
                return `<div onclick="selectDrug(${d.id})" class="p-4 rounded-2xl border-2 transition-all cursor-pointer ${isActive?'bg-sky-600 border-sky-600 text-white shadow-lg':'bg-white border-slate-100 text-slate-700'}">
                    <div class="font-bold">${d.name}</div>
                    <div class="text-xs opacity-60">${d.dose} ${d.unit}/kg</div>
                </div>`;
            }).join('');
        }

        window.selectDrug = (id) => {
            selected = selected.includes(id) ? selected.filter(i => i!==id) : [...selected, id];
            renderGrid();
        }

        document.getElementById('calculateBtn').onclick = () => {
            const results = document.getElementById('resultsContent');
            const isTiny = weight < 1;
            results.innerHTML = selected.map(id => {
                const d = DRUGS.find(x => x.id === id);
                let rawDose = weight * d.dose * (d.time || 1);
                if(id === 9) rawDose /= 1000;
                let f = d.factor, txt = TEXTS[d.m];
                if(isTiny) {
                    if([3, 7, 8].includes(id)) { f = (id === 8) ? 2.4 : 3; txt = txt.replace('10 سيسي ويعطى 10', '10 سيسي ويعطى 5').replace('##', '^^'); }
                    if(id === 1) { f = 100; txt = 'تسحب ** وحدة انسولين وتخفف مع 3 سيسي كلوكوز وتر وتعطى خلال 5 دقائق'; }
                    if(id === 14) { f = 6; txt = txt.replace('10 سيسي وتعطى 10', '10 سيسي وتعطى 5').replace('##', '^^'); }
                }
                if(id === 15) {
                    if(weight >= 2) f = 0.5;
                    else if(weight >= 1) f = 50;
                    else { f = 75; txt = txt.replace('20 سيسي', '15 سيسي').replace('تعطى 10', 'تعطى 5'); }
                }
                let vol = smart(weight * f);
                let finalTxt = txt.replace('**', vol).replace('##', smart(20 - parseFloat(vol))).replace('^^', smart(15 - parseFloat(vol)));
                return `<div class="bg-white p-5 rounded-3xl border-r-8 border-sky-500 shadow-sm">
                    <div class="text-sky-600 text-xs font-bold uppercase mb-1">${d.name}</div>
                    <div class="text-3xl font-black mb-2">${smart(rawDose)} <span class="text-sm font-normal text-slate-400">${id===9?'mg':d.unit}</span></div>
                    <p class="text-slate-600 text-sm leading-relaxed">${finalTxt}</p>
                </div>`;
            }).join('');
            toggleScreen(3);
        }
    </script>
</body>
</html>
